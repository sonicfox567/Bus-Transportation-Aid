<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebanon Bus Tracker - Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    
    <link rel="stylesheet" href="map.css">
</head>
<body>
    <header class="map-header">
        <button class="menu-btn" id="menuBtn" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <div class="logo-container">
            <div class="logo">LEBANON BUS</div>
        </div>
        
        <button class="refresh-btn" id="refreshBtn" aria-label="Refresh">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                <path d="M21 3v5h-5"></path>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                <path d="M3 21v-5h5"></path>
            </svg>
        </button>
    </header>

    <div class="menu-overlay" id="menuOverlay">    </div>

    <aside class="sidebar-menu" id="sidebarMenu">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="logo-box">
                    <div class="logo-text">LEBANON BUS</div>
                </div>
            </div>
        </div>

        <div class="sidebar-content">
            <div class="menu-item" id="accountItem" data-page="profile.html">
                <div class="menu-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="menu-text">
                    <div class="menu-label" id="accountType">Driver</div>
                    <div class="menu-sublabel" id="userName">Jad Mrad</div>
                </div>
            </div>

            <div class="menu-separator"></div>

            <div class="menu-item" id="paymentItem" data-page="payment.html">
                <div class="menu-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                        <line x1="1" y1="10" x2="23" y2="10"></line>
                    </svg>
                </div>
                <div class="menu-text">
                    <div class="menu-label">Payment</div>
                    <div class="menu-sublabel">Cash</div>
                </div>
            </div>

            <div class="menu-separator"></div>

            <div class="menu-item" id="discountsItem" data-page="discounts.html">
                <div class="menu-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="2" x2="12" y2="22"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <div class="menu-text">
                    <div class="menu-label">Discounts</div>
                </div>
            </div>

            <div class="menu-separator"></div>

            <div class="menu-item" id="addressesItem" data-page="addresses.html">
                <div class="menu-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <div class="menu-text">
                    <div class="menu-label">My addresses</div>
                </div>
            </div>

        </div>
    </aside>

    <div id="map"></div>

    <div class="location-banner" id="locationBanner" style="display: none;">
        <span>⚠️ Location access is recommended for better experience</span>
    </div>

    <div class="reservation-container">
        <button class="reservation-btn" id="reservationBtn">
            <span class="btn-icon">🚌</span>
            <span class="btn-text">Make Reservation for New Pickup</span>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <script src="api.js"></script>
    <script src="map.js"></script>
</body>
</html>
