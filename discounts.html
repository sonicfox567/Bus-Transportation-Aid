<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discounts - Lebanon Bus</title>
    <link rel="stylesheet" href="discounts.css">
</head>
<body>
    <header class="page-header">
        <button class="back-btn" onclick="window.location.href='map.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="page-title">Discounts</h1>
    </header>

    <div class="discounts-banner">
        <div class="banner-background">
            <div class="city-skyline"></div>
        </div>
        <div class="banner-illustration">
            <div class="illustration-platform"></div>
            <div class="gift-box gift-box-1"></div>
            <div class="gift-box gift-box-2"></div>
            <div class="coupon-stack"></div>
        </div>
    </div>

    <section class="discounts-section">
        <div class="discount-option">
            <div class="option-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </div>
            <span class="option-text">Invite your friends</span>
            <div class="option-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>

        <div class="discount-separator"></div>

        <div class="discount-option">
            <div class="option-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="8" width="18" height="12" rx="2"></rect>
                    <path d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"></path>
                    <path d="M7 12h10M7 16h10"></path>
                </svg>
            </div>
            <span class="option-text">Electronic vouchers</span>
            <div class="option-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>

        <div class="discount-separator"></div>

        <div class="discount-option">
            <div class="option-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                    <line x1="6" y1="10" x2="18" y2="10"></line>
                    <line x1="6" y1="14" x2="18" y2="14"></line>
                </svg>
            </div>
            <span class="option-text">Loyalty cards</span>
            <div class="option-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>
    </section>
</body>
</html>
