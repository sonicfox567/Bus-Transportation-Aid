<html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebanon Bus Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">
        <h2>Lebanon Public Buses</h2>


        <form novalidate>

            <div class="tooltip-container">
                <input type="text" class="input-box" placeholder="Username" required>
                <div class="custom-tooltip">
                    <span class="tooltip-icon">!</span> Please fill out this field.
                </div>
            </div>


            <div class="tooltip-container">
                <input type="password" class="input-box" placeholder="Password" required>
                <div class="custom-tooltip">
                    <span class="tooltip-icon">!</span> Please fill out this field.
                </div>
            </div>



            <button type="submit" class="login-btn">LOGIN</button>


            <a href="signup.html" class="signup-link">Sign Up</a>
        </form>
    </div>

    <script src="api.js"></script>
    <script>
        const form = document.querySelector('form');
        const loginBtn = document.querySelector('.login-btn');

        loginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            form.classList.add('submitted');

            if (form.checkValidity()) {
                const email = form.querySelector('input[type="text"]').value;
                const password = form.querySelector('input[type="password"]').value;

                try {
                    const data = await api.auth.login({ email, password });
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'map.html';
                } catch (error) {
                    alert(error.message);
                }
            }
        });
    </script>
</body>

</html>
