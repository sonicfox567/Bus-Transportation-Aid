<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Lebanon Bus</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <header class="page-header">
        <button class="back-btn" onclick="window.location.href='map.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="page-title">My profile</h1>
    </header>

    <div class="profile-section">
        <div class="profile-background">
            <div class="city-skyline"></div>
            <div class="profile-stripe"></div>
        </div>
        <div class="profile-avatar">
            <div class="avatar-circle">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </div>
        <div class="account-type">INDIVIDUAL ACCOUNT</div>
    </div>

    <section class="content-section">
        <div class="section-header">
            <div class="section-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <h2 class="section-title">DETAILS</h2>
        </div>
        <div class="details-content">
            <div class="detail-name" id="profileName">User Name</div>
            <div class="detail-row">
                <span class="detail-email" id="profileEmail">user@example.com</span>
                <button class="edit-btn">EDIT</button>
            </div>
            <div class="detail-phone" id="profilePhone">+961 XX XXX XXX</div>
        </div>
    </section>

    <section class="content-section">
        <div class="section-header">
            <div class="section-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2 class="section-title">PASSWORD</h2>
        </div>
        <div class="password-content">
            <span class="password-text">Change password</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </div>
    </section>

    <section class="content-section">
        <div class="section-header">
            <div class="section-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"></path>
                </svg>
            </div>
            <h2 class="section-title">SETTINGS</h2>
        </div>
        <div class="settings-content">
            <div class="setting-row">
                <div class="setting-info">
                    <div class="setting-label">Show my location to driver</div>
                    <div class="setting-description">Device GPS data will be used to show your current location to a driver for an active booking</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="locationToggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
    </section>

    <div class="signout-container">
        <a href="#" class="signout-btn" id="signOutBtn">SIGN OUT</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('user');
            if (storedUser) {
                const user = JSON.parse(storedUser);
                document.getElementById('profileName').textContent = user.username;
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('profilePhone').textContent = user.phone_number || 'No phone provided';
            }

            document.getElementById('signOutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
