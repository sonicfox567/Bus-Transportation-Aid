<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Payment Type - Lebanon Bus</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>
    <header class="page-header">
        <button class="back-btn" onclick="window.location.href='map.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="page-title">Choose payment type</h1>
    </header>

    <div class="payment-banner">
        <div class="banner-background">
            <div class="city-skyline"></div>
        </div>
        <div class="banner-illustration">
            <div class="illustration-card">
                <div class="card-chip"></div>
                <div class="card-stripe"></div>
            </div>
            <div class="illustration-phone"></div>
            <div class="illustration-coin"></div>
            <div class="illustration-banknote"></div>
        </div>
    </div>

    <section class="payment-section">
        <h2 class="section-label">PAYMENTS</h2>
        
        <div class="payment-option active" id="cashOption">
            <div class="option-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v12M8 10h8M8 14h8"></path>
                </svg>
            </div>
            <span class="option-text">Cash</span>
            <div class="option-check">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>

        <div class="payment-option" id="addCardOption">
            <div class="option-icon add-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </div>
            <span class="option-text add-text">Add new credit card</span>
            <div class="option-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>
    </section>
</body>
</html>
